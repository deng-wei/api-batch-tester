# 扫描所有输入图片
  image:
    glob: "/mnt/data/Project/qwen-image/批量测试/input/woman2/*"
    as: "base64"
    image_encode: "smart_jpeg"
    jpeg_quality: 95

# 关键：使用 random 策略
# pick 类型参数（prompt）每次随机选一个，
# 非 pick 参数（image）正常展开
combination: "random"

# 每组参数重复执行次数（结果文件名自动追加 _run1, _run2, ...）
repeat: 4

output:
  dir: "/mnt/data/Project/qwen-image/批量测试/output/round_woman2"
  save_response: true
  extract:
    - field: "data[0].b64_json"
      type: "base64_image"
      filename: "{image_name}.png"

result_log: "/mnt/data/Project/qwen-image/批量测试/output/round_woman2_results.jsonl"
