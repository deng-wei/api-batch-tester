# ========================================
# API 批量测试配置文件 — 随机提示词示例
# ========================================
# 场景：每张输入图片随机从 3 个提示词中选一个

api:
  base_url: "${DEERAPI_BASE_URL}/images/generations"
  api_key: "${DEERAPI_KEY}"
  timeout: 100
  max_retries: 2
  concurrency: 10

params:
  model: "doubao-seedream-4-0-250828"
  size: "2K"
  response_format: "b64_json"

  # 每次随机选一个提示词
  prompt:
    pick:
      # blackDCmale
      - "总体采用 DC 彩色美漫风格，线条硬朗、轮廓清晰、明暗对比强烈，色彩饱和干净，以块面光影呈现立体感；人物细节写实且富表现力。背景为纯白色，无任何多余元素。强烈的漫画笔触感。人物脸上光影明显，脸上结构感明显，人物整体肤色偏浅。人物需保持原有面部特征，肢体结构完整自然，无畸形与年龄不符情况。姿势为站立，双手自然交叉抱于胸前，整体稳重自信。服饰为复古商务风套装：黑色修身单排扣西装外套，挺括自然；内搭白色纯棉衬衫，领口笔挺、扣至顶端；下装为深色直筒西裤，材质硬挺有垂坠感，与上衣形成平衡。配饰包括黑色细纹理领带（领带结工整，长度至皮带扣位置）及深色皮质腰带，使整体造型更完整。整体呈现上世纪中期复古商务美学与现代剪裁的融合，通过美漫风格的力量感线条和强烈光影增强人物形象的鲜明度与立体感。"
      # yellowDCmale      
      - "总体采用 DC 彩色美漫风格，线条硬朗、轮廓清晰、明暗对比强烈，色彩饱和干净，以块面光影呈现立体感；人物细节写实且富表现力。背景为纯白色，无任何多余元素。强烈的漫画笔触感。人物脸上光影明显，脸上结构感明显，人物整体肤色偏浅。人物需保持原有面部特征，肢体结构完整自然，无畸形与年龄不符情况。姿势为站立，双手自然交叉抱于胸前，整体稳重自信。服饰为复古商务风套装：深土黄色修身单排扣西装外套，挺括自然；内搭白色纯棉衬衫，领口笔挺、扣至顶端；下装为深土黄色直筒西裤，材质硬挺有垂坠感，与上衣形成平衡。配饰包括棕色细纹领带（领带结工整，长度至皮带扣位置）及深色皮质腰带，使整体造型更完整。整体呈现上世纪中期复古商务美学与现代剪裁的融合，通过美漫风格的力量感线条和强烈光影增强人物形象的鲜明度与立体感。"
      # blueDCmale
      - "总体采用 DC 彩色美漫风格，线条硬朗、轮廓清晰、明暗对比强烈，色彩饱和干净，以块面光影呈现立体感；人物细节写实且富表现力。背景为纯白色，无任何多余元素。强烈的漫画笔触感。人物脸上光影明显，脸上结构感明显，人物整体肤色偏浅。人物需保持原有面部特征，肢体结构完整自然，无畸形与年龄不符情况。姿势为站立，双手自然交叉抱于胸前，整体稳重自信。服饰为复古商务风套装：深蓝色修身单排扣西装外套，挺括自然；内搭白色纯棉衬衫，领口笔挺、扣至顶端；下装为深蓝色直筒西裤，材质硬挺有垂坠感，与上衣形成平衡。配饰包括深蓝色细纹领带（领带结工整，长度至皮带扣位置）及深色皮质腰带，使整体造型更完整。整体呈现上世纪中期复古商务美学与现代剪裁的融合，通过美漫风格的力量感线条和强烈光影增强人物形象的鲜明度与立体感。"
      # blueDCfemale      
      # - "总体采用 DC 彩色美漫风格，线条硬朗、轮廓清晰、明暗对比强烈，色彩饱和干净，以块面光影呈现立体感；人物细节写实且富表现力。背景为纯白色，无任何多余元素。强烈的漫画笔触感。人物脸上光影明显，脸上结构感明显，人物整体肤色偏浅。人物需保持原有面部特征，肢体结构完整自然，无畸形与年龄不符情况。姿势为站立，双手自然交叉抱于胸前，整体稳重自信。纯白色背景，主体半身照，主体服饰为双手交叉抱于胸前，穿着一件长款的改良旗袍裙，整体为直筒略收腰的版型，旗袍没开叉。旗袍颜色是从浅到深的蓝色渐变，上身偏浅蓝，往下逐渐过渡到更饱和的宝蓝色，裙身上有均匀竖向的纹理或晕染效果，让整条裙子显得修长、干净又有一点现代感。领口是中高的立领设计，贴颈但不过分紧，领缘和门襟位置用较深的蓝色滚边勾勒出来。前襟采用偏传统的斜襟处理，从领口斜向一侧肩部和腋下方向延伸，并在这条斜线及侧缝上点缀同色系盘扣或小纽扣，既有旗袍特色，又不会显得太繁复。领口是中高的立领设计，贴颈但不过分紧，领缘和门襟位置用较深的蓝色滚边勾勒出来。前襟采用偏传统的斜襟处理，从领口斜向一侧肩部和腋下方向延伸，并在这条斜线及侧缝上点缀同色系盘扣或小纽扣，既有旗袍特色，又不会显得太繁复。袖子是七分袖，长度大概到小臂位置，袖口略收，并用同样深蓝色滚边收口，使手臂线条看起来更利落。整体风格偏民国复古感，端庄、典雅，又带一点华丽气质。整体呈现上世纪中期复古商务美学与现代剪裁的融合，通过美漫风格的力量感线条和强烈光影增强人物形象的鲜明度与立体感。"
