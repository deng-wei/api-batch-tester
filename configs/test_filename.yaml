# ========================================
# API 批量测试配置文件 — 文件名模板测试
# ========================================
# 测试目的：验证 {image_name} 占位符和自动索引功能

api:
  base_url: "https://api.example.com/v1/test"
  api_key: "dummy"
  concurrency: 5

params:
  # 模拟两张图片
  image:
    glob: "inputs/images/*.png"
    as: "base64"
  
  # 模拟两个提示词（笛卡尔积组合，会导致同名文件）
  prompt:
    pick:
      - "prompt 1"
      - "prompt 2"

# 使用 product 策略，每张图会产生 2 个任务
combination: "product"

output:
  dir: "outputs/test_filename"
  extract:
    - field: "data.b64"
      type: "base64_image"
      # 使用输入图片名作为前缀
      filename: "{image_name}.png" 

result_log: "outputs/test_filename/results.jsonl"
